services:
  app:
    build: .
    pull_policy: never
    image: atmos-toolkit
    container_name: atmos-toolkit
    restart: unless-stopped
    volumes:
      - atmos-data:/app/data
      - atmos-outputs:/app/outputs
      - ${TILES_HOST_PATH:-./atmos-tiles}:/app/atmos-tiles
    env_file:
      - .env
    # 默认定时模式：容器启动立即执行一次，随后按 GFS 周期（00/06/12/18 UTC + 延迟）调度
    # 可通过 command 覆盖，例如一次性获取 48 小时预报：
    # command: ["--forecast-hours", "48"]

volumes:
  atmos-data:
  atmos-outputs:
